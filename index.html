<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decipher</title>
    <style>
      :root {
        --decipher-primary: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background-color: var(--decipher-primary);
        padding: 24px;
      }

      .logo {
        width: min(90vw, 1400px);
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/assets/decipher-logo.png" alt="Decipher" />
  </body>
</html>
