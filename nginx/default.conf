server {
    listen 80 default_server;
    server_name _ www.decipherbrands.com decipherbrands.com;

    root /var/www/www;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name bellswellness.decipherbrands.com;

    root /var/www/bellswellness;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
